<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>NBL Contract Tracker</title>
    <link rel="icon" type="image/svg+xml" href="https://cdn.prod.website-files.com/64a4f0de3648103ab3295afa/681d456caf2cf62e29d2e155_NBL-HJ_Logo_NEW_Horizontal%20(3).svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      try {
        var t = localStorage.getItem("nbl-theme");
        if (t === "light") { document.documentElement.classList.remove("dark"); }
        else { document.documentElement.classList.add("dark"); }
      } catch(e) { document.documentElement.classList.add("dark"); }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
